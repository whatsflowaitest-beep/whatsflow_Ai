name: WhatsFlow AI CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Lint + Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: TypeScript compile check
        run: npm run build
        working-directory: server

      - name: Install frontend deps
        run: npm ci
        working-directory: .

      - name: Next.js type check
        run: npx tsc --noEmit
        working-directory: .

  # ── 2. Security Audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: npm audit (server)
        run: npm audit --audit-level=high
        working-directory: server
        continue-on-error: true   # Report but don't fail on moderate

      - name: npm audit (frontend)
        run: npm audit --audit-level=high
        working-directory: .
        continue-on-error: true

      - name: Check for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}

  # ── 3. Validation Suite ───────────────────────────────────────────────────────
  validate:
    name: Validation Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      ENCRYPTION_KEY:            ${{ secrets.ENCRYPTION_KEY }}
      ALLOWED_ORIGIN:            http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
        working-directory: server

      - name: Queue stress validation
        run: npm run validate:queue
        working-directory: server
        timeout-minutes: 5

      - name: Security penetration test
        run: npm run validate:security
        working-directory: server
        timeout-minutes: 5

  # ── 4. Database Migration Validation ─────────────────────────────────────────
  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Check migration file naming
        run: |
          for f in supabase/migrations/*.sql; do
            basename "$f" | grep -E '^[0-9]{14}_' || { echo "Bad migration name: $f"; exit 1; }
          done

      - name: Check migrations are idempotent (contain IF NOT EXISTS)
        run: |
          for f in supabase/migrations/*.sql; do
            if grep -q "CREATE TABLE [^I]" "$f" 2>/dev/null; then
              echo "WARNING: $f has CREATE TABLE without IF NOT EXISTS"
            fi
          done

  # ── 5. Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, security]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context:    ./server
          dockerfile: ./server/Dockerfile
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 6. Deploy to Staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [validate, docker-build, migrations]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io (staging)
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --app whatsflow-staging --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── 7. Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [validate, docker-build, migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io (production) — rolling strategy
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: |
          # Rolling deploy: new instances come up, pass health check, old ones drain
          flyctl deploy \
            --app whatsflow-prod \
            --strategy rolling \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify health after deploy
        run: |
          sleep 15
          curl -f "${{ vars.PRODUCTION_URL }}/health" || exit 1

      - name: Notify Sentry of new release
        run: |
          curl -sS https://sentry.io/api/0/organizations/${{ secrets.SENTRY_ORG }}/releases/ \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"${{ github.sha }}\", \"projects\": [\"whatsflow-api\"]}"
        continue-on-error: true
